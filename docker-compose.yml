services:
  app:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
      - "8501:8501"
    env_file: .env
    environment:
      POSTGRES__HOST: postgres
      REDIS__URL: "redis://redis:6379/0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:0.8.0-pg17
    environment:
      POSTGRES_USER: ${POSTGRES__USER:-leadership}
      POSTGRES_PASSWORD: ${POSTGRES__PASSWORD:-leadership_dev_password}
      POSTGRES_DB: ${POSTGRES__DATABASE:-leadership_agent}
    ports:
      - "${POSTGRES__PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES__USER:-leadership} -d ${POSTGRES__DATABASE:-leadership_agent}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
