name: CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "ui/**"
      - "pyproject.toml"
      - "uv.lock"
      - "infra/terraform/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "ui/**"
      - "pyproject.toml"
      - "uv.lock"
      - "infra/terraform/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked --dev
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked --dev
      - name: mypy
        run: uv run mypy backend/src/ --config-file pyproject.toml

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked --dev
      - name: Run unit tests
        run: uv run pytest backend/tests/unit/ -v --tb=short
      - name: Run integration tests
        run: uv run pytest backend/tests/integration/ -v --tb=short -m integration
      - name: Run evaluation dataset tests (no LLM)
        run: uv run pytest backend/tests/evaluation/ -v --tb=short -m "not evaluation"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f infra/docker/Dockerfile -t leadership-decision-assistant:ci .

  terraform:
    name: Terraform Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"
      - name: Terraform fmt
        run: terraform fmt -check -diff -recursive
      - name: Terraform init
        run: terraform init -backend=false
      - name: Terraform validate
        run: terraform validate
